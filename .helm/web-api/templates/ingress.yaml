{{- if .Values.api.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.api.fullnameOverride }}-ingress
  labels:
    app: {{ .Values.api.nameOverride }}
  {{- if .Values.api.ingress.annotations }}
  annotations:
    {{- toYaml .Values.api.ingress.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.api.ingress.className }}
  ingressClassName: {{ .Values.api.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.api.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Values.api.fullnameOverride }}-service
                port:
                  number: {{ $.Values.api.service.containerPort }}
          {{- end }}
    {{- end }}
{{- end }}