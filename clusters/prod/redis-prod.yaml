apiVersion: redis.redis.opstreelabs.in/v1beta1
kind: RedisCluster
metadata:
  name: redis-prod
  namespace: prod
spec:
  clusterSize: 3
  kubernetesConfig:
    kubernetesClusterDomain: cluster.local
  redisLeader:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
  nodeSelector:
    env: prod