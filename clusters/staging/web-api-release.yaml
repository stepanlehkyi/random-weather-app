apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: web-api-staging
  namespace: staging
spec:
  interval: 1m
  targetNamespace: staging
  chart:
    spec:
      chart: .helm/web-api
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    replicaCount: 1
    autoscaling:
      enabled: false 
    nodeSelector:
      env: staging
    ingress:
      hosts:
        - host: angular-dotnet-web-app.stg.com.ua
          paths:
            - path: /api
              pathType: Prefix
    apiConfig:
      data:
        ASPNETCORE_ENVIRONMENT: "Staging"