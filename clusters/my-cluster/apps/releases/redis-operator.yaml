apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: my-redis-operator
  namespace: default
spec:
  interval: 1h 
  chart:
    spec:
      chart: redis-operator
      version: "0.24.0"
      sourceRef:
        kind: HelmRepository
        name: ot-container-kit
        namespace: flux-system
  install:
    createNamespace: true 
    crds: CreateReplace 
  upgrade:
    crds: CreateReplace 
      