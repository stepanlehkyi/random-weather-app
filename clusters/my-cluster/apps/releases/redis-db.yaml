apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisCluster
metadata:
  name: my-redis-cluster
  namespace: default
spec:
  clusterSize: 3
  
  kubernetesConfig:
    image: "quay.io/opstree/redis:v7.2.4"
    imagePullPolicy: IfNotPresent

  redisLeader:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

  redisFollower:
    replicas: 1 
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 256Mi