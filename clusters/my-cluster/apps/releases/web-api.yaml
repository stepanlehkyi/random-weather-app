apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weather-api
  namespace: weather-system
spec:
  interval: 1m
  targetNamespace: weather-system
  chart:
    spec:
      chart: .helm/web-api 
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system