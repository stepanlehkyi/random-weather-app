kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: web-cluster
nodes:
  - role: control-plane
    labels:
      ingress-ready: "true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
  - role: worker
    labels:
      env: staging
  - role: worker
    labels:
      env: prod