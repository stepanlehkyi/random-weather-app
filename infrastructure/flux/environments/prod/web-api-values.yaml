# Backend API Configuration for Production
apiConfig:
  name: weather-api-config
  data:
    WeatherApi__MaxForecastDays: "5"
    WeatherApi__MinTemperatureC: "-20"
    WeatherApi__MaxTemperatureC: "0"
    WeatherApi__EnableCaching: "true"
    WeatherApi__CacheDurationSeconds: "600"
    WeatherApi__ApiVersion: "1.0"
    ASPNETCORE_ENVIRONMENT: "Production"
    ASPNETCORE_URLS: "http://+:8080"
  ConnectionStrings__Redis: "redis-prod-leader.prod.svc.cluster.local:6379"
    Logging__LogLevel__Default: "Warning"
 Logging__LogLevel__Microsoft.AspNetCore: "Error"

api:
  ingress:
    enabled: true
    className: "traefik"
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: prod-strip-api-prefix@kubernetescrd
    hosts:
      - host: angular-dotnet-web-app.com.ua
      paths:
     - path: /api
            pathType: Prefix
    middleware:
      enabled: true
      name: strip-api-prefix
      prefixes:
    - /api

  replicaCount: 2
  nameOverride: "weather-api"
  fullnameOverride: "weather-api"

  image:
    repository: stepanlehkyi/dotnet-web-api
    tag: "1.0.5"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080
  containerPort: 8080
    protocol: TCP
    name: http

  probes:
    liveness:
      httpGet:
    path: /health/live
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 15
    readiness:
      httpGet:
path: /health/ready
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 7
      successThreshold: 1
    failureThreshold: 5

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  nodeSelector:
    env: prod

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
