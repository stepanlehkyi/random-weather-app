apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: redis-prod
  namespace: prod
spec:
  interval: 5m
  chart:
    spec:
      chart: redis-operator
      sourceRef:
     kind: HelmRepository
        name: redis-operator
        namespace: flux-system
      version: '>=3.0.0 <4.0.0'
  values:
    replicas: 3
    storage: 10Gi
    image:
      tag: v7-latest
    resources:
    requests:
 cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      enabled: true
      size: 10Gi
    sentinel:
      enabled: true
      replicas: 3
    metrics:
      enabled: true
